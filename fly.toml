# Fly.io — deploy BACKEND only (Express API)
# Submit https://epifishare.fly.dev (or your app URL) for the assignment

app = 'epifishare'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  NODE_ENV = 'production'
  SEED_ON_START = 'false'
  COOKIE_SECURE = 'true'
