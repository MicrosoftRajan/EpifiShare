# Netlify — FRONTEND only (Next.js in frontend/)
# API stays on Render. Set NEXT_PUBLIC_API_URL in Netlify → Environment.
#
# In Netlify UI: leave "Publish directory" EMPTY (do not set "frontend").
# Publish directory must not equal base directory.

[build]
  base = "frontend"
  command = "npm run build"
  # Do not set publish — @netlify/plugin-nextjs handles output

[[plugins]]
  package = "@netlify/plugin-nextjs"
